<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rancangan Aktualisasi - Andy Rasyadi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Iframe fullscreen ── */
    .fp-iframe {
      border: none !important;
      width: 100% !important;
      height: 100vh !important;
      display: block;
    }

    /* ── Music toggle button ── */
    #music-btn {
      position: fixed;
      bottom: 18px;
      left: 18px;
      z-index: 9999;

      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      cursor: pointer;

      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);

      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }

    #music-btn:hover {
      background: rgba(255, 255, 255, 0.28);
      transform: scale(1.08);
    }

    #music-btn:active {
      transform: scale(0.95);
    }

    /* SVG icons inside button */
    #music-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      display: none;
      flex-shrink: 0;
    }

    #music-btn svg.visible {
      display: block;
    }

    /* Ripple pulse when music is ON */
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(1.7); opacity: 0;    }
    }

    #music-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      animation: pulse-ring 1.8s ease-out infinite;
      opacity: 0;
      pointer-events: none;
    }

    #music-btn.playing::before {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Heyzine Flipbook Embed -->
  <iframe
    allowfullscreen="allowfullscreen"
    allow="clipboard-write"
    scrolling="no"
    class="fp-iframe"
    src="https://heyzine.com/flip-book/b4c9eb4126.html"
  ></iframe>

  <!-- Background music — ganti src dengan path file MP3 Anda -->
  <audio id="bg-music" loop preload="auto">
    <source src="/music/background.mp3" type="audio/mpeg" />
  </audio>

  <!-- Tombol ON/OFF di pojok kiri bawah -->
  <button id="music-btn" title="Nyalakan Musik" aria-label="Toggle Music">

    <!-- Icon: speaker ON -->
    <svg id="icon-on" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>

    <!-- Icon: speaker OFF (muted) -->
    <svg id="icon-off" class="visible" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l2 2L21 18.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>

  </button>

  <script>
    const audio   = document.getElementById('bg-music');
    const btn     = document.getElementById('music-btn');
    const iconOn  = document.getElementById('icon-on');
    const iconOff = document.getElementById('icon-off');

    let isPlaying = false;

    function setPlaying(state) {
      isPlaying = state;
      if (isPlaying) {
        audio.play().catch(() => {});
        btn.classList.add('playing');
        iconOn.classList.add('visible');
        iconOff.classList.remove('visible');
        btn.title = 'Matikan Musik';
      } else {
        audio.pause();
        btn.classList.remove('playing');
        iconOn.classList.remove('visible');
        iconOff.classList.add('visible');
        btn.title = 'Nyalakan Musik';
      }
    }

    // Toggle saat tombol diklik
    btn.addEventListener('click', () => setPlaying(!isPlaying));

    // Autoplay aktif setelah interaksi pertama pengguna
    document.addEventListener('click', function startOnFirstClick() {
      if (!isPlaying) setPlaying(true);
      document.removeEventListener('click', startOnFirstClick);
    }, { once: true });
  </script>

</body>
</html>
